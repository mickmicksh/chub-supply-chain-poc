<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Checkout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .product {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .product-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .product-description {
            color: #666;
            font-size: 14px;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .price {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .checkout-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .checkout-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .cancel-btn {
            background: #e9ecef;
            color: #333;
        }

        .cancel-btn:hover {
            background: #dee2e6;
        }

        .security-info {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .security-info::before {
            content: "🔒";
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin-top: 10px;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Premium Plan</h1>
        <p class="subtitle">Upgrade your account and get exclusive features</p>

        <div class="product">
            <div class="product-name">Premium Membership</div>
            <div class="product-description">
                Get access to all premium features including:
                <ul style="margin-left: 20px; margin-top: 8px; font-size: 13px;">
                    <li>Unlimited storage</li>
                    <li>Priority support</li>
                    <li>Advanced analytics</li>
                </ul>
            </div>
            <div class="price">$20.00</div>
        </div>

        <form id="checkout-form" action="/create-checkout-session" method="POST">
            <div class="button-group">
                <button type="submit" class="checkout-btn" id="checkout-btn">
                    Proceed to Checkout
                </button>
            </div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Redirecting to checkout...</p>
            </div>
        </form>

        <div class="security-info">
            Secure payment powered by Stripe
        </div>
    </div>

    <script>
        const form = document.getElementById('checkout-form');
        const checkoutBtn = document.getElementById('checkout-btn');
        const loading = document.getElementById('loading');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            checkoutBtn.disabled = true;
            loading.style.display = 'block';

            try {
                const response = await fetch('/create-checkout-session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    }
                });

                if (!response.ok) {
                    const error = await response.json();
                    alert('Error: ' + error.error);
                    checkoutBtn.disabled = false;
                    loading.style.display = 'none';
                }
                // Redirect happens automatically with 303 redirect
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
                checkoutBtn.disabled = false;
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
