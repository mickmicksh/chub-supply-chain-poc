<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Checkout - Python</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .product-details {
            background: #f7f8fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .product-name {
            color: #333;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .product-price {
            color: #667eea;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .product-description {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .checkout-button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 15px;
        }

        .checkout-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .checkout-button:active {
            transform: translateY(0);
        }

        .test-cards {
            background: #f0f4ff;
            border: 1px solid #e0e7ff;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }

        .test-cards-title {
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .test-card {
            font-size: 12px;
            color: #333;
            margin: 5px 0;
            font-family: 'Courier New', monospace;
        }

        .test-card-number {
            color: #667eea;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stripe Checkout</h1>
        <p class="subtitle">Python Flask Integration Demo</p>

        <div class="product-details">
            <div class="product-name">Premium Plan</div>
            <div class="product-price">$20.00</div>
            <div class="product-description">
                Get access to premium features including priority support, advanced analytics, and unlimited storage.
            </div>
        </div>

        <form action="/create-checkout-session" method="POST">
            <button type="submit" class="checkout-button">
                Proceed to Checkout
            </button>
        </form>

        <div class="test-cards">
            <div class="test-cards-title">Test Cards</div>
            <div class="test-card">
                <span class="test-card-number">4242 4242 4242 4242</span> - Success
            </div>
            <div class="test-card">
                <span class="test-card-number">4000 0000 0000 0002</span> - Decline
            </div>
            <div class="test-card">
                <span class="test-card-number">4000 0025 0000 3155</span> - 3D Secure
            </div>
        </div>
    </div>
</body>
</html>
