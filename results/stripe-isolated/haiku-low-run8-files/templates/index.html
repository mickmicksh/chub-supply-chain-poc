<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Checkout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .product {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            background: #f9f9f9;
        }

        .product-name {
            font-weight: 600;
            color: #333;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .product-description {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .product-price {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }

        .price-currency {
            font-size: 20px;
            vertical-align: super;
        }

        .checkout-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .checkout-btn:active {
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        .error {
            color: #e74c3c;
            background: #fadbd8;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 Premium Plan</h1>
            <p class="subtitle">Upgrade to premium and unlock all features</p>
        </div>

        <div class="error" id="error-message"></div>

        <div class="product">
            <div class="product-name">Premium Plan</div>
            <div class="product-description">Access to premium features, priority support, and exclusive content</div>
            <div class="product-price">
                <span class="price-currency">$</span>20<span class="price-currency">.00</span>
            </div>
        </div>

        <form method="POST" action="/create-checkout-session">
            <button type="submit" class="checkout-btn">Proceed to Checkout</button>
        </form>

        <div class="footer">
            <p>Test card: 4242 4242 4242 4242 | Any future date | Any CVC</p>
        </div>
    </div>

    <script>
        // Handle form submission errors
        document.querySelector('form').addEventListener('submit', function(e) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.style.display = 'none';
        });
    </script>
</body>
</html>
