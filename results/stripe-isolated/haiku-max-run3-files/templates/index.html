<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Checkout - Premium Plan</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 1rem;
        }
        .price {
            font-size: 3rem;
            font-weight: bold;
            color: #667eea;
            margin: 1rem 0;
        }
        .features {
            text-align: left;
            margin: 2rem 0;
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 4px;
        }
        .features li {
            margin: 0.5rem 0;
            color: #666;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            margin-top: 1rem;
        }
        button:hover {
            background: #764ba2;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .test-cards {
            margin-top: 2rem;
            padding: 1rem;
            background: #fff3cd;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Premium Plan</h1>
        <p>Get access to all premium features</p>

        <div class="price">$20.00</div>

        <div class="features">
            <ul>
                <li>✓ Unlimited access</li>
                <li>✓ Priority support</li>
                <li>✓ Advanced analytics</li>
                <li>✓ Custom integrations</li>
            </ul>
        </div>

        <form method="POST" action="/create-checkout-session">
            <button type="submit" id="checkout-btn">
                Proceed to Checkout
            </button>
        </form>

        <div class="test-cards">
            <strong>Test Cards:</strong><br>
            <code>4242 4242 4242 4242</code> - Success<br>
            <code>4000 0000 0000 0002</code> - Decline<br>
            <code>4000 0025 0000 3155</code> - 3D Secure
        </div>
    </div>

    <script>
        document.getElementById('checkout-btn').addEventListener('click', function(e) {
            this.disabled = true;
            this.textContent = 'Processing...';
        });
    </script>
</body>
</html>
