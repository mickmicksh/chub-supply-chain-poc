<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Checkout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .checkout-container {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        button {
            background-color: #5469d4;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #423c99;
        }
        .price {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <h1>Premium Plan</h1>
        <div class="price">$20.00</div>
        <p>Get access to premium features and content</p>
        <form method="POST" action="/create-checkout-session">
            <button type="submit">Proceed to Checkout</button>
        </form>
    </div>
</body>
</html>
