<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Checkout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .product {
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .product-description {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .price {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .test-cards {
            background: #f5f5f5;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 30px;
            font-size: 13px;
            color: #666;
        }

        .test-cards h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 14px;
        }

        .test-cards p {
            margin-bottom: 5px;
        }

        .test-cards code {
            background: white;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: monospace;
            color: #333;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error {
            color: #e74c3c;
            margin-top: 15px;
            padding: 12px;
            background: #fadbd8;
            border-radius: 6px;
            display: none;
        }

        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Premium Plan</h1>
        <p class="subtitle">Get access to premium features</p>

        <div class="product">
            <div class="product-name">Premium Plan</div>
            <div class="product-description">
                Unlock all premium features including advanced analytics, priority support, and more.
            </div>
            <div class="price">$20.00</div>
        </div>

        <div class="test-cards">
            <h3>Test Card Numbers</h3>
            <p><code>4242424242424242</code> - Successful payment</p>
            <p><code>4000000000000002</code> - Card declined</p>
            <p><code>4000002500003155</code> - 3D Secure required</p>
        </div>

        <form id="checkout-form" method="POST" action="/create-checkout-session">
            <button type="submit" id="checkout-button">Proceed to Checkout</button>
        </form>

        <div class="error" id="error-message"></div>
    </div>

    <script>
        const form = document.getElementById('checkout-form');
        const checkoutButton = document.getElementById('checkout-button');
        const errorMessage = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            checkoutButton.disabled = true;
            checkoutButton.textContent = 'Redirecting...';

            try {
                const response = await fetch('/create-checkout-session', {
                    method: 'POST',
                });

                if (response.ok) {
                    // Redirect will be handled by server
                    form.submit();
                } else {
                    const data = await response.json();
                    throw new Error(data.error || 'An error occurred');
                }
            } catch (error) {
                errorMessage.textContent = `Error: ${error.message}`;
                errorMessage.classList.add('show');
                checkoutButton.disabled = false;
                checkoutButton.textContent = 'Proceed to Checkout';
            }
        });
    </script>
</body>
</html>
