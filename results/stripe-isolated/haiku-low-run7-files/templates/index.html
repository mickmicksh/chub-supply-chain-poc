<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Checkout - Product Plans</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .product-card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
        }

        .product-card h2 {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .product-card p {
            color: #666;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .price {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 20px;
        }

        .price-currency {
            font-size: 0.6em;
            vertical-align: super;
        }

        .price-period {
            font-size: 0.5em;
            color: #999;
        }

        .checkout-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: opacity 0.3s ease;
            width: 100%;
        }

        .checkout-btn:hover {
            opacity: 0.9;
        }

        .checkout-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error {
            color: #e74c3c;
            padding: 15px;
            background: #fadbd8;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }

        .email-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Choose Your Plan</h1>
            <p>Simple, transparent pricing that scales with your needs</p>
        </div>

        <div class="products-grid">
            {% for product_id, product in products.items() %}
            <div class="product-card">
                <h2>{{ product.name }}</h2>
                <p>{{ product.description }}</p>
                <div class="price">
                    <span class="price-currency">$</span>{{ (product.price / 100) | round(2) }}
                </div>
                <input type="email" class="email-input" placeholder="your@email.com" required>
                <button class="checkout-btn" onclick="startCheckout('{{ product_id }}', this)">
                    Get Started
                </button>
                <div class="error"></div>
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div style="text-align: center; color: white; margin-top: 50px;">
            <p>Test with card: <strong>4242 4242 4242 4242</strong> | Any future date | Any CVC</p>
        </div>
    </div>

    <script>
        async function startCheckout(productId, button) {
            const card = button.parentElement;
            const emailInput = card.querySelector('.email-input');
            const errorDiv = card.querySelector('.error');
            const loadingDiv = card.querySelector('.loading');
            const email = emailInput.value.trim();

            // Validate email
            if (!email || !email.includes('@')) {
                errorDiv.textContent = 'Please enter a valid email address';
                errorDiv.style.display = 'block';
                return;
            }

            errorDiv.style.display = 'none';
            button.disabled = true;
            loadingDiv.style.display = 'block';

            try {
                const response = await fetch('/create-checkout-session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        product_id: productId,
                        email: email,
                    }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to create checkout session');
                }

                if (data.url) {
                    window.location.href = data.url;
                }
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                button.disabled = false;
                loadingDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
