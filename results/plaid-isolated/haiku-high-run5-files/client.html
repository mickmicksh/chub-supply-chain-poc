<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Plaid Link Integration Demo</title>
    <script src="https://cdn.plaid.com/link/v3/stable/link-initialize.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section-title {
            color: #444;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 100%;
            font-weight: 600;
        }
        button:hover {
            background: #5568d3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .status {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 4px;
            margin-top: 15px;
            font-size: 13px;
            color: #555;
        }
        .status.success {
            border-left-color: #10b981;
            background: #ecfdf5;
            color: #065f46;
        }
        .status.error {
            border-left-color: #ef4444;
            background: #fef2f2;
            color: #7f1d1d;
        }
        .token-display {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 12px;
            margin-top: 10px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #374151;
            max-height: 150px;
            overflow-y: auto;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 Plaid Link</h1>
        <p class="subtitle">Connect your bank account securely</p>

        <div class="section">
            <div class="section-title">Step 1: Initialize Link</div>
            <button onclick="createLinkToken()" id="initBtn">
                Initialize Link Token
            </button>
            <div id="tokenStatus" class="status" style="display: none;"></div>
        </div>

        <div class="section">
            <div class="section-title">Step 2: Open Plaid Link</div>
            <button onclick="openPlaidLink()" id="linkBtn" disabled>
                Open Link (Disabled until token created)
            </button>
        </div>

        <div class="section">
            <div class="section-title">Results</div>
            <div id="result" class="status" style="display: none;"></div>
        </div>

        <div class="section">
            <div class="section-title">Debug Info</div>
            <div id="debug" class="status" style="display: none;">
                <strong>Events:</strong>
                <div id="debugContent" style="margin-top: 10px;"></div>
            </div>
        </div>
    </div>

    <script>
        let linkToken = null;

        async function createLinkToken() {
            const btn = document.getElementById('initBtn');
            const statusDiv = document.getElementById('tokenStatus');

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span>Creating token...';

                const response = await fetch('/api/create-link-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: 'user-' + Math.random().toString(36).substr(2, 9)
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                linkToken = data.link_token;

                statusDiv.className = 'status success';
                statusDiv.textContent = `✓ Link token created successfully`;
                statusDiv.style.display = 'block';

                document.getElementById('linkBtn').disabled = false;

                addDebug('Link token created');
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `✗ Error: ${error.message}`;
                statusDiv.style.display = 'block';
                addDebug(`Error creating token: ${error.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Initialize Link Token';
            }
        }

        function openPlaidLink() {
            if (!linkToken) {
                alert('Please create a link token first');
                return;
            }

            const handler = Plaid.create({
                token: linkToken,
                onSuccess: (public_token, metadata) => {
                    addDebug(`Link Success: ${metadata.institution.name}`);
                    exchangeToken(public_token);
                },
                onExit: (err, metadata) => {
                    if (err) {
                        addDebug(`Link Exit Error: ${err.error_code}`);
                    } else {
                        addDebug('Link closed by user');
                    }
                },
                onEvent: (eventName, metadata) => {
                    addDebug(`Event: ${eventName}`);
                }
            });

            handler.open();
        }

        async function exchangeToken(publicToken) {
            try {
                const response = await fetch('/api/exchange-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        public_token: publicToken
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const resultDiv = document.getElementById('result');

                resultDiv.className = 'status success';
                resultDiv.innerHTML = `
                    <strong>✓ Bank account connected successfully!</strong>
                    <div class="token-display">
                        <strong>Access Token:</strong><br>
                        ${data.access_token}<br><br>
                        <strong>Item ID:</strong><br>
                        ${data.item_id}
                    </div>
                `;
                resultDiv.style.display = 'block';

                addDebug('Token exchange successful');
            } catch (error) {
                const resultDiv = document.getElementById('result');
                resultDiv.className = 'status error';
                resultDiv.innerHTML = `<strong>✗ Token exchange failed:</strong><br>${error.message}`;
                resultDiv.style.display = 'block';
                addDebug(`Token exchange error: ${error.message}`);
            }
        }

        function addDebug(message) {
            const debugDiv = document.getElementById('debug');
            const content = document.getElementById('debugContent');

            debugDiv.style.display = 'block';
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.style.marginBottom = '5px';
            entry.style.fontSize = '12px';
            entry.textContent = `[${timestamp}] ${message}`;
            content.insertBefore(entry, content.firstChild);
        }

        // Initial debug message
        addDebug('Client initialized');
    </script>
</body>
</html>
