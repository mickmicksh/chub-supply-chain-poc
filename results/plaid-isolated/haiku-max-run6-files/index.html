<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plaid Link Integration</title>
    <script src="https://cdn.plaid.com/link/v3/stable/link-initialize.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.loading {
            background: #e7f3ff;
            color: #004085;
            border: 1px solid #b8daff;
            display: block;
        }

        .status-title {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .access-token {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            margin-top: 10px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 4px;
            max-height: 100px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 Bank Connection</h1>
        <p class="subtitle">Connect your bank account securely using Plaid Link</p>

        <button id="linkButton">Connect Bank Account</button>

        <div id="status" class="status"></div>
    </div>

    <script>
        const linkButton = document.getElementById('linkButton');
        const statusDiv = document.getElementById('status');

        linkButton.addEventListener('click', initiateLinkFlow);

        async function initiateLinkFlow() {
            try {
                // Step 1: Get a link token from the backend
                statusDiv.className = 'status loading';
                statusDiv.innerHTML = `<div class="status-title"><span class="spinner"></span> Initializing...</div>`;

                const linkTokenResponse = await fetch('/api/create-link-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: 'user-' + Date.now() })
                });

                if (!linkTokenResponse.ok) {
                    throw new Error('Failed to create link token');
                }

                const { link_token } = await linkTokenResponse.json();

                // Step 2: Initialize Plaid Link with the token
                const handler = Plaid.create({
                    token: link_token,
                    onSuccess: onLinkSuccess,
                    onExit: onLinkExit,
                    onEvent: onLinkEvent,
                });

                // Step 3: Open the Plaid Link flow
                handler.open();

            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `
                    <div class="status-title">❌ Error</div>
                    <p>${error.message}</p>
                `;
            }
        }

        async function onLinkSuccess(publicToken, metadata) {
            try {
                statusDiv.className = 'status loading';
                statusDiv.innerHTML = `<div class="status-title"><span class="spinner"></span> Exchanging token...</div>`;

                // Exchange the public token for an access token
                const response = await fetch('/api/exchange-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ public_token: publicToken })
                });

                if (!response.ok) {
                    throw new Error('Failed to exchange token');
                }

                const { access_token, item_id } = await response.json();

                statusDiv.className = 'status success';
                statusDiv.innerHTML = `
                    <div class="status-title">✅ Success!</div>
                    <p>Your bank account has been connected successfully.</p>
                    <p><strong>Item ID:</strong> ${item_id}</p>
                    <p><strong>Access Token:</strong></p>
                    <div class="access-token">${access_token}</div>
                `;

                linkButton.textContent = 'Connect Another Account';

            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `
                    <div class="status-title">❌ Exchange Failed</div>
                    <p>${error.message}</p>
                `;
            }
        }

        function onLinkExit(err, metadata) {
            if (err !== null) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `
                    <div class="status-title">❌ User Exited</div>
                    <p>${err.display_message || 'The flow was interrupted.'}</p>
                `;
            } else {
                statusDiv.className = '';
                statusDiv.innerHTML = '';
            }
        }

        function onLinkEvent(eventName, metadata) {
            console.log('Plaid Link event:', eventName, metadata);
        }
    </script>
</body>
</html>
