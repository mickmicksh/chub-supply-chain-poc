<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plaid Link Integration</title>
    <script src="https://cdn.plaid.com/link/v3/stable/link-initialize.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1f2937;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #6b7280;
            margin-bottom: 30px;
        }
        button {
            background: #0066ff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #0052cc;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f0f9ff;
            border-left: 4px solid #0066ff;
            border-radius: 4px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result h3 {
            margin-top: 0;
            color: #0066ff;
        }
        .error {
            background: #fef2f2;
            border-left-color: #dc2626;
        }
        .error h3 {
            color: #dc2626;
        }
        pre {
            background: #1f2937;
            color: #e5e7eb;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 Plaid Link Integration</h1>
        <p class="subtitle">Connect your bank account securely</p>

        <button onclick="startPlaidFlow()" id="linkButton">
            Connect Bank Account
        </button>

        <div id="result" class="result">
            <h3 id="resultTitle">Success</h3>
            <pre id="resultContent"></pre>
        </div>
    </div>

    <script>
        const userId = 'test-user-' + Date.now();
        let linkTokenData = null;

        async function startPlaidFlow() {
            const button = document.getElementById('linkButton');
            button.disabled = true;
            button.textContent = 'Loading...';

            try {
                // Step 1: Create Link token
                const tokenResponse = await fetch('/api/create-link-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        products: ['auth', 'transactions'],
                        country_codes: ['US']
                    })
                });

                if (!tokenResponse.ok) {
                    throw new Error('Failed to create link token');
                }

                linkTokenData = await tokenResponse.json();
                console.log('Link token created:', linkTokenData);

                // Step 2: Initialize Plaid Link
                const handler = Plaid.create({
                    token: linkTokenData.link_token,
                    onSuccess: onPlaidSuccess,
                    onExit: onPlaidExit,
                    onLoad: () => console.log('Plaid Link loaded'),
                });

                handler.open();

            } catch (error) {
                showError('Failed to initialize Plaid Link: ' + error.message);
            } finally {
                button.disabled = false;
                button.textContent = 'Connect Bank Account';
            }
        }

        async function onPlaidSuccess(publicToken, metadata) {
            console.log('Plaid success callback', { publicToken, metadata });

            try {
                // Step 3: Exchange public token for access token
                const response = await fetch('/api/exchange-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ public_token: publicToken })
                });

                if (!response.ok) {
                    throw new Error('Failed to exchange token');
                }

                const data = await response.json();
                showSuccess('Bank account connected successfully!', {
                    accessToken: data.access_token,
                    itemId: data.item_id,
                    institution: metadata.institution,
                    linkedAccounts: metadata.accounts
                });

            } catch (error) {
                showError('Failed to exchange token: ' + error.message);
            }
        }

        function onPlaidExit(error, metadata) {
            if (error) {
                console.error('Plaid error:', error);
                showError('Plaid Link exited with error: ' + error.error_message);
            } else {
                console.log('Plaid Link closed');
            }
        }

        function showSuccess(title, data) {
            const resultDiv = document.getElementById('result');
            document.getElementById('resultTitle').textContent = '✓ ' + title;
            document.getElementById('resultContent').textContent = JSON.stringify(data, null, 2);
            resultDiv.classList.remove('error');
            resultDiv.classList.add('show');
        }

        function showError(message) {
            const resultDiv = document.getElementById('result');
            document.getElementById('resultTitle').textContent = '✗ Error';
            document.getElementById('resultContent').textContent = message;
            resultDiv.classList.add('error');
            resultDiv.classList.add('show');
        }
    </script>
</body>
</html>
