<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plaid Link Integration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px 20px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-bottom: 15px;
        }

        button:hover {
            background-color: #5568d3;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .status {
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
            font-size: 14px;
        }

        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .token-display {
            background-color: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 150px;
            overflow-y: auto;
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: white;
            animation: spinner 1s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spinner {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 Bank Account Connection</h1>
        <p class="subtitle">Connect your bank account securely with Plaid Link</p>

        <button id="linkButton" onclick="openPlaidLink()">
            Connect Bank Account
        </button>

        <div id="status" class="status"></div>
        <div id="tokenDisplay" class="token-display" style="display: none;"></div>
    </div>

    <script src="https://cdn.plaid.com/link/v1/stable/link-initialize.js"></script>
    <script>
        let linkHandler;

        // Initialize Plaid Link when page loads
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/create-link-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: 'user-' + Math.random().toString(36).substr(2, 9)
                    })
                });

                const data = await response.json();

                if (data.error) {
                    showStatus('error', 'Failed to initialize Plaid Link: ' + data.error);
                    document.getElementById('linkButton').disabled = true;
                    return;
                }

                // Create Plaid Link handler
                linkHandler = Plaid.create({
                    token: data.link_token,
                    onSuccess: (publicToken) => {
                        exchangeToken(publicToken);
                    },
                    onExit: (err, metadata) => {
                        if (err) {
                            showStatus('error', 'User exited Plaid Link: ' + err.display_message);
                        } else {
                            showStatus('info', 'User closed Plaid Link');
                        }
                    },
                    onEvent: (eventName, metadata) => {
                        console.log('Plaid event:', eventName, metadata);
                    }
                });

                showStatus('info', 'Plaid Link initialized. Click the button to connect your bank.');
            } catch (error) {
                showStatus('error', 'Failed to load Plaid Link: ' + error.message);
                document.getElementById('linkButton').disabled = true;
            }
        });

        function openPlaidLink() {
            if (linkHandler) {
                linkHandler.open();
            }
        }

        async function exchangeToken(publicToken) {
            const button = document.getElementById('linkButton');
            button.disabled = true;
            button.textContent = 'Processing...';

            try {
                const response = await fetch('/api/exchange-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        public_token: publicToken
                    })
                });

                const data = await response.json();

                if (data.error) {
                    showStatus('error', 'Token exchange failed: ' + data.error);
                } else {
                    showStatus('success', '✅ Bank account connected successfully!');
                    displayToken('access_token', data.access_token);
                    displayToken('item_id', data.item_id);
                }
            } catch (error) {
                showStatus('error', 'Token exchange error: ' + error.message);
            } finally {
                button.disabled = false;
                button.textContent = 'Connect Bank Account';
            }
        }

        function showStatus(type, message) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
        }

        function displayToken(label, token) {
            const display = document.getElementById('tokenDisplay');
            display.style.display = 'block';
            display.innerHTML = `<strong>${label}:</strong><br>${token}`;
        }
    </script>
</body>
</html>
