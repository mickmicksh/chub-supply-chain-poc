<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plaid Link Integration</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .container {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #1f2937;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 30px;
        }

        .button {
            background-color: #6366f1;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .button:hover {
            background-color: #4f46e5;
        }

        .button:disabled {
            background-color: #d1d5db;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }

        .status.success {
            background-color: #ecfdf5;
            color: #065f46;
            border: 1px solid #6ee7b7;
            display: block;
        }

        .status.error {
            background-color: #fef2f2;
            color: #7f1d1d;
            border: 1px solid #fca5a5;
            display: block;
        }

        .info-box {
            background-color: #f0f9ff;
            border-left: 4px solid #0284c7;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
            color: #0c2d57;
        }

        code {
            background-color: #f3f4f6;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 Plaid Link Integration</h1>
        <p class="subtitle">Connect your bank account securely</p>

        <button class="button" id="linkButton" onclick="openPlaidLink()">
            Connect Bank Account
        </button>

        <div id="status" class="status"></div>

        <div class="info-box">
            <strong>Test Credentials (Sandbox):</strong><br>
            Use any Plaid test credentials with a valid bank login flow.
            <a href="https://plaid.com/docs/sandbox/" target="_blank">View test credentials →</a>
        </div>
    </div>

    <!-- Plaid Link Script -->
    <script src="https://cdn.plaid.com/link/v3/stable/link-initialize.js"></script>

    <script>
        let linkHandler;
        const linkButton = document.getElementById('linkButton');
        const statusDiv = document.getElementById('status');

        async function initializePlaidLink() {
            try {
                // Create a link token
                const response = await fetch('/api/create-link-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: 'user-' + Math.random().toString(36).substr(2, 9),
                    }),
                });

                if (!response.ok) {
                    throw new Error('Failed to create link token');
                }

                const data = await response.json();
                const linkToken = data.link_token;

                // Initialize Plaid Link
                linkHandler = Plaid.create({
                    token: linkToken,
                    onSuccess: handlePlaidSuccess,
                    onExit: handlePlaidExit,
                    onEvent: handlePlaidEvent,
                });

                linkButton.disabled = false;
            } catch (error) {
                showStatus('Error initializing Plaid Link: ' + error.message, 'error');
                linkButton.disabled = true;
            }
        }

        function openPlaidLink() {
            if (linkHandler) {
                linkHandler.open();
            }
        }

        async function handlePlaidSuccess(publicToken, metadata) {
            try {
                // Exchange the public token for an access token
                const response = await fetch('/api/exchange-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        public_token: publicToken,
                    }),
                });

                if (!response.ok) {
                    throw new Error('Failed to exchange token');
                }

                const data = await response.json();
                showStatus(
                    `✓ Bank account connected successfully!<br>Item ID: <code>${data.item_id}</code>`,
                    'success'
                );
            } catch (error) {
                showStatus('Error exchanging token: ' + error.message, 'error');
            }
        }

        function handlePlaidExit(error, metadata) {
            if (error) {
                showStatus('Plaid Link closed with error: ' + error.message, 'error');
            } else {
                showStatus('Plaid Link closed', 'success');
            }
        }

        function handlePlaidEvent(eventName, metadata) {
            console.log('Plaid event:', eventName, metadata);
        }

        function showStatus(message, type) {
            statusDiv.innerHTML = message;
            statusDiv.className = `status ${type}`;
        }

        // Initialize Plaid Link when page loads
        window.addEventListener('DOMContentLoaded', initializePlaidLink);
    </script>
</body>
</html>
