<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plaid Link Integration</title>
    <script src="https://cdn.plaid.com/link/v3/stable/link-initialize.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 4px;
        }

        .info-box p {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
        }

        button {
            width: 100%;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #5568d3;
        }

        button:active {
            transform: scale(0.98);
        }

        .status {
            margin-top: 30px;
            padding: 20px;
            border-radius: 6px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            display: block;
        }

        .status h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .status p {
            font-size: 14px;
            word-break: break-all;
        }

        .token-info {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 4px;
            margin-top: 10px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Connect Your Bank</h1>

        <div class="info-box">
            <p>Use Plaid Link to securely connect your bank account. Your financial information will be safely verified.</p>
        </div>

        <div class="loading" id="loading">
            Initializing Plaid Link...
        </div>

        <button id="linkButton" onclick="initiatePlaidLink()">
            Connect Bank Account
        </button>

        <div class="status" id="status"></div>
    </div>

    <script>
        const userId = 'user-' + Math.random().toString(36).substr(2, 9);

        async function initiatePlaidLink() {
            const button = document.getElementById('linkButton');
            const loading = document.getElementById('loading');
            const statusDiv = document.getElementById('status');

            button.disabled = true;
            loading.style.display = 'block';
            statusDiv.style.display = 'none';

            try {
                // Step 1: Create link token
                const tokenResponse = await fetch('/api/create-link-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ user_id: userId }),
                });

                if (!tokenResponse.ok) {
                    throw new Error('Failed to create link token');
                }

                const { link_token } = await tokenResponse.json();

                // Step 2: Initialize Plaid Link
                const config = {
                    token: link_token,
                    onSuccess: handleLinkSuccess,
                    onExit: handleLinkExit,
                };

                const handler = Plaid.create(config);
                handler.open();

            } catch (error) {
                showError('Failed to initialize Plaid Link: ' + error.message);
            } finally {
                button.disabled = false;
                loading.style.display = 'none';
            }
        }

        async function handleLinkSuccess(publicToken, metadata) {
            try {
                // Step 3: Exchange public token for access token
                const exchangeResponse = await fetch('/api/exchange-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ public_token: publicToken }),
                });

                if (!exchangeResponse.ok) {
                    throw new Error('Failed to exchange token');
                }

                const { access_token, item_id } = await exchangeResponse.json();

                showSuccess(
                    'Bank account connected successfully!',
                    `Item ID: ${item_id}\nAccess Token: ${access_token.substring(0, 20)}...`
                );

            } catch (error) {
                showError('Failed to complete connection: ' + error.message);
            }
        }

        function handleLinkExit(err, metadata) {
            if (err != null) {
                showError('Plaid Link exited with error: ' + err.message);
            }
        }

        function showSuccess(title, message) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status success';
            statusDiv.innerHTML = `
                <h3>${title}</h3>
                <p>${message}</p>
            `;
        }

        function showError(message) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status error';
            statusDiv.innerHTML = `
                <h3>Error</h3>
                <p>${message}</p>
            `;
        }
    </script>
</body>
</html>
