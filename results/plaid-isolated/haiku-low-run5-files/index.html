<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plaid Link Integration</title>
    <script src="https://cdn.plaid.com/link/v3/stable/link-initialize.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 20px;
        }
        button {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0052a3;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .status.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 Bank Account Connection</h1>
        <p>Connect your bank account securely using Plaid Link</p>
        <button id="linkButton">Connect Bank Account</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        const linkButton = document.getElementById('linkButton');
        const statusDiv = document.getElementById('status');

        // Step 1: Create link token
        async function createLinkToken() {
            try {
                statusDiv.className = 'status info';
                statusDiv.textContent = 'Creating link token...';

                const response = await fetch('/api/create-link-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: 'user-' + Date.now(),
                    }),
                });

                if (!response.ok) {
                    throw new Error('Failed to create link token');
                }

                const data = await response.json();
                return data.link_token;
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = 'Error: ' + error.message;
                throw error;
            }
        }

        // Step 2: Initialize and open Plaid Link
        async function openPlaidLink() {
            try {
                linkButton.disabled = true;
                const linkToken = await createLinkToken();

                const handler = Plaid.create({
                    token: linkToken,
                    onSuccess: async (public_token) => {
                        await exchangeToken(public_token);
                    },
                    onExit: (error) => {
                        if (error != null) {
                            statusDiv.className = 'status error';
                            statusDiv.textContent = 'Error: ' + error.display_message;
                        } else {
                            statusDiv.className = '';
                        }
                        linkButton.disabled = false;
                    },
                    onEvent: (eventName, metadata) => {
                        console.log('Plaid Link event:', eventName, metadata);
                    },
                });

                handler.open();
            } catch (error) {
                linkButton.disabled = false;
            }
        }

        // Step 3: Exchange public token for access token
        async function exchangeToken(public_token) {
            try {
                statusDiv.className = 'status info';
                statusDiv.textContent = 'Exchanging token...';

                const response = await fetch('/api/exchange-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        public_token: public_token,
                    }),
                });

                if (!response.ok) {
                    throw new Error('Failed to exchange token');
                }

                const data = await response.json();
                statusDiv.className = 'status success';
                statusDiv.textContent = '✅ Bank account connected successfully! Access Token: ' + data.access_token.substring(0, 10) + '...';
                linkButton.disabled = false;
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = 'Error: ' + error.message;
                linkButton.disabled = false;
            }
        }

        // Attach click handler
        linkButton.addEventListener('click', openPlaidLink);
    </script>
</body>
</html>
