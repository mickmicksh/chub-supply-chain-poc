<!DOCTYPE html>
<html>
<head>
    <title>Plaid Link Integration</title>
    <script src="https://cdn.plaid.com/link/v3/stable/link-initialize.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
        }
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Connect Your Bank Account</h1>
    <button onclick="initiatePlaidLink()">Connect Bank</button>
    <div id="status"></div>

    <script>
        async function initiatePlaidLink() {
            try {
                // Get link token from backend
                const linkTokenResponse = await fetch('/api/create-link-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ user_id: 'user-123' })
                });

                const { link_token, error } = await linkTokenResponse.json();

                if (error) {
                    showStatus(`Error creating link token: ${error}`, 'error');
                    return;
                }

                // Initialize Plaid Link
                const config = {
                    token: link_token,
                    onSuccess: handlePlaidSuccess,
                    onExit: handlePlaidExit,
                    onEvent: handlePlaidEvent,
                };

                Plaid.create(config).open();

            } catch (err) {
                showStatus(`Error: ${err.message}`, 'error');
            }
        }

        async function handlePlaidSuccess(publicToken, metadata) {
            try {
                // Exchange public token for access token
                const response = await fetch('/api/exchange-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ public_token: publicToken })
                });

                const { access_token, item_id, error } = await response.json();

                if (error) {
                    showStatus(`Error exchanging token: ${error}`, 'error');
                } else {
                    showStatus(
                        `Successfully connected! Item ID: ${item_id}`,
                        'success'
                    );
                }
            } catch (err) {
                showStatus(`Error: ${err.message}`, 'error');
            }
        }

        function handlePlaidExit(err, metadata) {
            if (err != null) {
                showStatus(`Plaid Link exited with error: ${err.message}`, 'error');
            } else {
                showStatus('Plaid Link closed', 'error');
            }
        }

        function handlePlaidEvent(eventName, metadata) {
            console.log(`Plaid event: ${eventName}`, metadata);
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
        }
    </script>
</body>
</html>
