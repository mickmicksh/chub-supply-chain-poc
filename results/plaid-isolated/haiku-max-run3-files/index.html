<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plaid Link Integration</title>
    <script src="https://cdn.plaid.com/link/v3/stable/link-initialize.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }
        button {
            background-color: #0066cc;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0052a3;
        }
        #status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Connect Your Bank Account</h1>
        <p>Click the button below to securely connect your bank account using Plaid Link.</p>
        <button id="linkButton">Connect Bank Account</button>
        <div id="status"></div>
    </div>

    <script>
        const linkButton = document.getElementById('linkButton');
        const statusDiv = document.getElementById('status');

        linkButton.addEventListener('click', async () => {
            try {
                // Get Link token from backend
                const linkTokenResponse = await fetch('/api/create-link-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                });

                if (!linkTokenResponse.ok) {
                    throw new Error('Failed to create link token');
                }

                const { link_token } = await linkTokenResponse.json();

                // Initialize Plaid Link
                const handler = Plaid.create({
                    token: link_token,
                    onSuccess: async (publicToken, metadata) => {
                        // Exchange public token for access token
                        const exchangeResponse = await fetch('/api/exchange-token', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ public_token: publicToken }),
                        });

                        if (!exchangeResponse.ok) {
                            throw new Error('Failed to exchange token');
                        }

                        const { access_token, item_id } = await exchangeResponse.json();
                        showStatus(`Success! Connected account: ${item_id}`, 'success');
                    },
                    onExit: (err, metadata) => {
                        if (err) {
                            showStatus(`Error: ${err.error_message}`, 'error');
                        } else {
                            showStatus('Plaid Link was closed', 'error');
                        }
                    },
                });

                handler.open();
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            }
        });

        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = type;
        }
    </script>
</body>
</html>
