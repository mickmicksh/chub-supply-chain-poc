<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Account Connection - Plaid Link</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #45a049;
        }
        .status {
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
            display: none;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .info {
            background-color: #e7f3ff;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Connect Your Bank Account</h1>

        <div class="info">
            <strong>Sandbox Mode:</strong> Use the test credentials provided by Plaid during onboarding.
            Visit <a href="https://plaid.com/docs/quickstart/" target="_blank">Plaid Docs</a> for test credentials.
        </div>

        <button onclick="openPlaidLink()">Connect Bank Account</button>

        <div id="status" class="status"></div>
    </div>

    <script src="https://cdn.plaid.com/link/v3/stable/link-initialize.js"></script>
    <script>
        let linkHandler;

        async function openPlaidLink() {
            try {
                // Create link token from backend
                const tokenResponse = await fetch('/api/create-link-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: 'user-123', // Replace with actual user ID
                    })
                });

                if (!tokenResponse.ok) {
                    showStatus('Failed to create link token', 'error');
                    return;
                }

                const { link_token } = await tokenResponse.json();

                // Initialize Plaid Link
                linkHandler = Plaid.create({
                    token: link_token,
                    onSuccess: handlePlaidSuccess,
                    onExit: handlePlaidExit,
                    onEvent: handlePlaidEvent,
                });

                linkHandler.open();
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            }
        }

        async function handlePlaidSuccess(public_token, metadata) {
            try {
                // Exchange public token for access token
                const response = await fetch('/api/exchange-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        public_token: public_token,
                    })
                });

                if (!response.ok) {
                    showStatus('Failed to exchange token', 'error');
                    return;
                }

                const { access_token, item_id } = await response.json();
                showStatus(
                    `✓ Successfully connected! Item ID: ${item_id}`,
                    'success'
                );
                console.log('Access Token:', access_token);
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            }
        }

        function handlePlaidExit(err, metadata) {
            if (err) {
                showStatus(`Plaid Link closed with error: ${err.message}`, 'error');
            } else {
                showStatus('Plaid Link closed', 'error');
            }
        }

        function handlePlaidEvent(eventName, metadata) {
            console.log('Plaid event:', eventName, metadata);
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }
    </script>
</body>
</html>
